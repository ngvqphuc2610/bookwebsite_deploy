name: Deploy to Production

on:
  workflow_dispatch:  # Manual trigger from GitHub UI
  push:
    branches: [main]
    paths-ignore:
      - '*.md'
      - '.gitignore'

jobs:
  # First run CI checks
  ci:
    uses: ./.github/workflows/ci.yml

  deploy:
    name: Deploy to GCP VPS
    needs: ci
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd /opt/bookwebsite

            echo "📥 Pulling latest code..."
            git pull origin main

            echo "🔨 Building and restarting containers..."
            docker compose -f docker-compose.prod.yml up -d --build --remove-orphans

            echo "⏳ Waiting for services to start..."
            sleep 15

            echo "🏥 Health check..."
            # Check if containers are running
            docker compose -f docker-compose.prod.yml ps

            # Check if backend is responding (up to 10 retries, 5s apart)
            HEALTHY=false
            for i in {1..10}; do
              echo "🏥 Health check... ($i/10)"
              if curl -sf http://localhost/api/stories > /dev/null 2>&1; then
                echo "✅ Backend is healthy and responding!"
                HEALTHY=true
                break
              fi
              echo "⚠️ Backend not ready yet, waiting 5s..."
              sleep 5
            done

            if [ "$HEALTHY" = false ]; then
              echo "❌ ERROR: Backend failed to respond after 10 attempts."
              echo "🔍 Hint: Run 'docker logs bookwebsite-backend-1' on VPS to see why."
              exit 1
            fi

            # Check if frontend is responding
            if curl -sf http://localhost > /dev/null 2>&1; then
              echo "✅ Frontend is healthy!"
            else
              echo "⚠️ Frontend health check failed (Nginx might still be starting)"
            fi

            echo "🧹 Cleaning up old Docker images..."
            docker image prune -f

            echo "✅ Deploy completed at $(date)"
