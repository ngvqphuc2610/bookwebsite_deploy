name: CI

on:
  push:
  pull_request:
  workflow_dispatch:
  workflow_call:  # Allow deploy-prod.yml to call this as a reusable workflow

jobs:
  frontend-build:
    name: Frontend build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Fontend-ONLINE-STORY-READING-WEBSITE-
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: Fontend-ONLINE-STORY-READING-WEBSITE-/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build
        env:
          VITE_API_URL: /api
          VITE_WS_URL: /ws
          VITE_ENABLE_AI_CHAT: "false"
          VITE_ENABLE_VECTOR_SEARCH: "false"

  backend-unit-and-package:
    name: Backend unit tests and package
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ONLINE-STORY-READING-WEBSITE
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Make Maven wrapper executable
        run: chmod +x mvnw

      - name: Run backend unit tests
        run: ./mvnw -B -Dtest=ChatbotServiceTest,CustomerCareServiceTest test

      - name: Package backend
        run: ./mvnw -B -DskipTests package

  docker-compose-config:
    name: Docker compose config validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate production compose file
        run: docker compose --env-file .env.example -f docker-compose.prod.yml config