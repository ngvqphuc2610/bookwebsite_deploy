services:
  mysql:
    image: mysql:8.4
    restart: unless-stopped
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-nhom8_db2}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "127.0.0.1:3307:3306"
    healthcheck:
      test: [ "CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$${MYSQL_ROOT_PASSWORD} --silent" ]
      interval: 10s
      timeout: 5s
      retries: 10

  qdrant:
    image: qdrant/qdrant:latest
    restart: unless-stopped
    volumes:
      - qdrant_storage:/qdrant/storage
    ports:
      - "127.0.0.1:6333:6333"
      - "127.0.0.1:6334:6334"
    healthcheck:
      test: [ "CMD-SHELL", "curl -sf http://localhost:6333/healthz || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 5

  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "127.0.0.1:11434:11434"
    deploy:
      resources:
        limits:
          memory: 4G

  backend:
    build:
      context: ./ONLINE-STORY-READING-WEBSITE
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL:-jdbc:mysql://mysql:3306/nhom8_db2?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME:-root}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD:-change_app_password}
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_JPA_SHOW_SQL: "false"
      SPRING_JPA_PROPERTIES_HIBERNATE_DIALECT: org.hibernate.dialect.MySQLDialect
      APP_JWT_SECRET: ${APP_JWT_SECRET:-replace_with_a_long_random_secret}
      APP_JWT_EXPIRATION_MS: ${APP_JWT_EXPIRATION_MS:-86400000}
      APP_CORS_ALLOWED_ORIGINS: ${APP_CORS_ALLOWED_ORIGINS:-https://alexdev.software,https://www.alexdev.software}
      # ── AI / Vector features ──
      APP_FEATURES_VECTOR_SEARCH_ENABLED: ${APP_FEATURES_VECTOR_SEARCH_ENABLED:-true}
      APP_FEATURES_AI_CHAT_ENABLED: ${APP_FEATURES_AI_CHAT_ENABLED:-true}
      QDRANT_URL: ${QDRANT_URL:-http://qdrant:6333}
      QDRANT_COLLECTION: ${QDRANT_COLLECTION:-manga}
      QDRANT_EMBED_DIM: ${QDRANT_EMBED_DIM:-768}
      OLLAMA_URL: ${OLLAMA_URL:-http://ollama:11434}
      OLLAMA_CHAT_MODEL: ${OLLAMA_CHAT_MODEL:-qwen2.5:3b}
      OLLAMA_EMBED_MODEL: ${OLLAMA_EMBED_MODEL:-nomic-embed-text}
      # ── Payment ──
      VNPAY_TMN_CODE: ${VNPAY_TMN_CODE:-}
      VNPAY_HASH_SECRET: ${VNPAY_HASH_SECRET:-}
      VNPAY_BASE_URL: ${VNPAY_BASE_URL:-https://sandbox.vnpayment.vn/paymentv2/vpcpay.html}
      VNPAY_VERSION: ${VNPAY_VERSION:-2.1.0}
      VNPAY_COMMAND: ${VNPAY_COMMAND:-pay}
      VNPAY_CURR_CODE: ${VNPAY_CURR_CODE:-VND}
      VNPAY_LOCALE: ${VNPAY_LOCALE:-vn}
      VNPAY_RETURN_URL: ${VNPAY_RETURN_URL:-https://alexdev.software/api/payment/vnpay-callback}
      # ── Email ──
      SPRING_MAIL_HOST: ${SPRING_MAIL_HOST:-smtp.gmail.com}
      SPRING_MAIL_PORT: ${SPRING_MAIL_PORT:-587}
      SPRING_MAIL_USERNAME: ${SPRING_MAIL_USERNAME:-}
      SPRING_MAIL_PASSWORD: ${SPRING_MAIL_PASSWORD:-}
      SPRING_MAIL_SMTP_AUTH: ${SPRING_MAIL_SMTP_AUTH:-true}
      SPRING_MAIL_SMTP_STARTTLS_ENABLE: ${SPRING_MAIL_SMTP_STARTTLS_ENABLE:-true}
      SPRING_MAIL_SMTP_STARTTLS_REQUIRED: ${SPRING_MAIL_SMTP_STARTTLS_REQUIRED:-true}
      # ── OAuth2 ──
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      # ── Admin ──
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin123}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@alexdev.software}
      JAVA_OPTS: ${JAVA_OPTS:--Xms512m -Xmx2048m}
    depends_on:
      mysql:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    expose:
      - "8080"
    volumes:
      - backend_uploads:/app/uploads

  frontend:
    build:
      context: ./Fontend-ONLINE-STORY-READING-WEBSITE-
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-/api}
        VITE_WS_URL: ${VITE_WS_URL:-/ws}
        VITE_ENABLE_AI_CHAT: ${VITE_ENABLE_AI_CHAT:-true}
        VITE_ENABLE_VECTOR_SEARCH: ${VITE_ENABLE_VECTOR_SEARCH:-true}
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"

volumes:
  mysql_data:
  backend_uploads:
  qdrant_storage:
  ollama_data:
