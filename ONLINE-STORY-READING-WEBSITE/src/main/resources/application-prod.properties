spring.application.name=Nhom8

# ‚îÄ‚îÄ Database ‚îÄ‚îÄ
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://mysql:3306/nhom8_db2?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:nhom8_user}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:change_me}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ‚îÄ‚îÄ JPA / Hibernate ‚îÄ‚îÄ
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.dialect=${SPRING_JPA_PROPERTIES_HIBERNATE_DIALECT:org.hibernate.dialect.MySQLDialect}
spring.jpa.properties.hibernate.format_sql=false

# ‚îÄ‚îÄ JWT ‚îÄ‚îÄ
app.jwt.secret=${APP_JWT_SECRET:replace_with_a_long_random_secret}
app.jwt.expirationMs=${APP_JWT_EXPIRATION_MS:86400000}

# ‚îÄ‚îÄ File Upload ‚îÄ‚îÄ
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ‚îÄ‚îÄ VNPay ‚îÄ‚îÄ
vnpay.tmn-code=${VNPAY_TMN_CODE:}
vnpay.hash-secret=${VNPAY_HASH_SECRET:}
vnpay.base-url=${VNPAY_BASE_URL:https://sandbox.vnpayment.vn/paymentv2/vpcpay.html}
vnpay.version=${VNPAY_VERSION:2.1.0}
vnpay.command=${VNPAY_COMMAND:pay}
vnpay.curr-code=${VNPAY_CURR_CODE:VND}
vnpay.locale=${VNPAY_LOCALE:vn}
vnpay.return-url=${VNPAY_RETURN_URL:https://alexdev.software/api/payment/vnpay-callback}

# ‚îÄ‚îÄ Google OAuth2 ‚îÄ‚îÄ
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:}

# ‚îÄ‚îÄ Email ‚îÄ‚îÄ
spring.mail.host=${SPRING_MAIL_HOST:smtp.gmail.com}
spring.mail.port=${SPRING_MAIL_PORT:587}
spring.mail.username=${SPRING_MAIL_USERNAME:}
spring.mail.password=${SPRING_MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${SPRING_MAIL_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${SPRING_MAIL_SMTP_STARTTLS_ENABLE:true}
spring.mail.properties.mail.smtp.starttls.required=${SPRING_MAIL_SMTP_STARTTLS_REQUIRED:true}

# ‚îÄ‚îÄ CORS ‚îÄ‚îÄ
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:https://alexdev.software,https://www.alexdev.software}

# ‚îÄ‚îÄ Qdrant (Vector DB) ‚îÄ‚îÄ
qdrant.url=${QDRANT_URL:http://qdrant:6333}
qdrant.collection=${QDRANT_COLLECTION:manga}
qdrant.embed-dim=${QDRANT_EMBED_DIM:768}

# ‚îÄ‚îÄ Ollama (LLM) ‚îÄ‚îÄ
ollama.url=${OLLAMA_URL:http://ollama:11434}
ollama.embed-model=${OLLAMA_EMBED_MODEL:nomic-embed-text}
ollama.chat-model=${OLLAMA_CHAT_MODEL:qwen2.5:3b}

# ‚îÄ‚îÄ Feature Flags ‚îÄ‚îÄ
app.features.vector-search-enabled=${APP_FEATURES_VECTOR_SEARCH_ENABLED:true}
app.features.ai-chat-enabled=${APP_FEATURES_AI_CHAT_ENABLED:true}

# ‚îÄ‚îÄ Logging (production: less verbose) ‚îÄ‚îÄ
logging.level.org.springframework.security=WARN
logging.level.org.springframework.web=WARN
