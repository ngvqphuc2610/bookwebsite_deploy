services:
  mysql:
    image: mysql:8.0
    container_name: story_db
    environment:
      MYSQL_ROOT_PASSWORD: root_password_here
      MYSQL_DATABASE: nhom8_db
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    restart: unless-stopped

  backend:
    build: .
    container_name: story_backend
    depends_on:
      - mysql
    environment:
      # Use internal MySQL host
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/nhom8_db?useSSL=false&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root_password_here
      # Path to local Ollama and Qdrant (you will need a public URL or Tunnel for these)
      OLLAMA_URL: http://your-local-ip-or-tunnel-url:11434
      QDRANT_URL: http://your-local-ip-or-tunnel-url:6335
    ports:
      - "8080:8080"
    volumes:
      - ./uploads:/app/uploads
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: story_frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

  # Nginx Proxy Manager (Optional, help for DuckDNS and SSL)
  nginx-proxy:
    image: 'jc21/nginx-proxy-manager:latest'
    container_name: story_proxy
    restart: unless-stopped
    ports:
      - '81:81'   # Admin Dashboard
      - '443:443' # HTTPS
    volumes:
      - ./proxy/data:/data
      - ./proxy/letsencrypt:/etc/letsencrypt

volumes:
  mysql_data:
